<style>
:root {
  --bg: #f0efeb;
  --white: #ffffff;
  --card: #ffffff;
  --border: #e4e2db;
  --border2: #ccc9be;
  --text: #1a1a1a;
  --text2: #777;
  --text3: #bbb;
  --accent: #2d5be3;
  --accent-bg: #eef1fd;
  --accent-mid: #4a72e8;
  --green: #1a9e6e;
  --green-bg: #e8f7f2;
  --red: #d94040;
  --red-bg: #fdf0f0;
  --shadow-card: 0 2px 12px rgba(0,0,0,0.08), 0 0.5px 2px rgba(0,0,0,0.05);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}

/* ── Header ── */
.header{background:var(--white);padding:12px 18px 10px;flex-shrink:0;box-shadow:var(--shadow-sm);}
.header-top{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;gap:10px;}
.app-title{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-0.5px;line-height:1;}
.header-actions{display:flex;gap:8px;align-items:center;}
.icon-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--bg);color:var(--text2);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Outfit',sans-serif;}
.icon-btn:active{background:var(--border);}

/* Trip pills */





/* ── Member bar ── */
.member-bar{background:var(--white);display:flex;gap:8px;padding:10px 14px;flex-shrink:0;border-top:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
.member-bar::-webkit-scrollbar{display:none;}
.mem-chip{flex:1;min-width:72px;display:flex;flex-direction:column;gap:5px;padding:9px 10px;border-radius:0;border:1.5px solid var(--border);background:var(--white);cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.mem-chip.on{border-color:var(--accent);background:var(--accent-bg);}
.mem-chip.complete{border-color:var(--green);background:var(--green-bg);}
@keyframes chipPop{0%{transform:scale(1)}40%{transform:scale(1.04)}100%{transform:scale(1)}}
.mem-chip.complete{animation:chipPop .35s ease;}
.mem-chip-top{display:flex;align-items:center;gap:5px;}
.mem-av{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;}
.mem-name{font-size:11px;font-weight:600;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mem-pct{font-size:10px;font-weight:700;color:var(--text3);flex-shrink:0;}
.mem-chip.on .mem-pct{color:var(--accent);}
.mem-chip.complete .mem-pct{color:var(--green);}
.mem-mini-track{height:4px;background:var(--border);border-radius:0;overflow:hidden;}
.mem-mini-fill{height:4px;border-radius:0;transition:width .5s cubic-bezier(.4,0,.2,1);}
.add-mem{width:44px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:0;border:1.5px dashed var(--border2);background:transparent;color:var(--text3);font-size:20px;cursor:pointer;}
.add-mem:active{background:var(--accent-bg);}
@keyframes confettiFly{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(-120px) rotate(720deg);opacity:0}}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:0;pointer-events:none;z-index:999;animation:confettiFly .9s ease-out forwards;}



/* ── Scroll area ── */
.scroll-area{flex:1;overflow-y:auto;padding:8px 14px 90px;scrollbar-width:none;display:flex;flex-direction:column;gap:6px;}
.scroll-area::-webkit-scrollbar{display:none;}

/* ── Category card ── */
.cat-card{background:var(--card);border-radius:0;overflow:visible;box-shadow:var(--shadow-card);}
.cat-hdr{display:flex;align-items:center;gap:8px;padding:7px 14px;}
.cat-icon{width:22px;height:22px;border-radius:0;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.cat-info{flex:1;min-width:0;}
.cat-name{font-size:14px;font-weight:600;color:var(--text);}







/* Item rows */
.items-wrap{border-top:1px solid var(--border);border-radius:0;overflow:hidden;}
.item-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bg);cursor:pointer;background:var(--white);user-select:none;transition:background .1s;}
.item-row:last-of-type{border-bottom:none;}
.item-row:active{background:#fafaf8;}
.item-row.done{background:#fdfdfb;}
.item-row.done .item-text{text-decoration:line-through;color:var(--text3);}
.chk{width:20px;height:20px;border-radius:0;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--white);}
.item-row.done .chk{background:var(--green);border-color:var(--green);}
.chk-mark{display:none;color:white;font-size:11px;font-weight:700;}
.item-row.done .chk-mark{display:block;}
.item-body{flex:1;min-width:0;}
.item-text{font-size:13px;font-weight:500;color:var(--text);line-height:1.2;}
.item-qty{font-size:11px;font-weight:600;color:var(--accent);margin-top:2px;}
.must-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:0;background:var(--red-bg);color:var(--red);flex-shrink:0;}
.del-btn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;flex-shrink:0;}
.del-btn:active{background:var(--red-bg);color:var(--red);}

/* Done section */
.done-sep{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--bg);}
.done-sep-label{font-size:11px;color:var(--text3);font-weight:600;}
.done-toggle{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:500;}

/* Add row */
.cat-add-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;color:var(--text3);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;line-height:1;}
.cat-add-btn:active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.add-popup-bg{display:none;position:fixed;inset:0;z-index:150;background:rgba(0,0,0,0.3);}
.add-popup-bg.show{display:flex;align-items:flex-end;}
.add-popup{background:var(--white);border-radius:0;padding:20px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom));width:100%;}
.add-popup-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:12px;}
.add-popup-row{display:flex;gap:8px;align-items:center;}
.add-popup-inp{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:0;padding:12px 14px;font-family:'Outfit',sans-serif;font-size:15px;color:var(--text);outline:none;}
.add-popup-inp:focus{border-color:var(--accent);}
.add-popup-inp::placeholder{color:var(--text3);}
.add-popup-ok{padding:12px 20px;border-radius:0;background:var(--accent);border:none;color:white;font-size:14px;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer;white-space:nowrap;}

/* ── Bottom bar ── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));background:transparent;pointer-events:none;}
.bb-btn{width:100%;padding:14px;border-radius:0;border:none;background:var(--accent);color:white;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(45,91,227,0.3);pointer-events:all;}
.bb-btn:active{background:#2450c8;}

/* ── Modals ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:100;align-items:flex-end;}
.modal-bg.show{display:flex;}
.modal{background:var(--white);border-radius:0;padding:20px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom));width:100%;max-height:82vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;border-radius:0;background:var(--border2);margin:0 auto 18px;}
.modal-title{font-size:18px;font-weight:700;margin-bottom:18px;color:var(--text);}
.modal-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;}
.modal-inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:0;padding:13px 14px;font-family:'Outfit',sans-serif;font-size:16px;color:var(--text);outline:none;margin-bottom:16px;}
.modal-inp:focus{border-color:var(--accent);background:var(--white);}
.color-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.cswatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:border .12s;}
.cswatch.sel{border-color:var(--text);}
.modal-check{display:flex;align-items:center;gap:10px;padding:13px 0;border-top:1px solid var(--border);}
.modal-check label{font-size:15px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;width:100%;}
.modal-check input{width:20px;height:20px;accent-color:var(--accent);}
.modal-btns{display:flex;gap:8px;margin-top:18px;}
.modal-btn{flex:1;padding:14px;border-radius:0;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;cursor:pointer;}
.modal-btn.pri{background:var(--accent);color:white;border-color:var(--accent);font-weight:600;}
.modal-btn.danger{color:var(--red);border-color:var(--red-bg);background:var(--red-bg);}


/* Settings modal */
.settings-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);}
.settings-item:last-of-type{border-bottom:none;}
.settings-label{font-size:15px;font-weight:500;color:var(--text);}
.settings-sub{font-size:12px;color:var(--text3);margin-top:2px;}
.settings-days{display:flex;align-items:center;gap:8px;}
.settings-days-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:var(--white);color:var(--text);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.settings-days-btn:active{background:var(--accent-bg);}
.settings-days-num{min-width:28px;text-align:center;font-size:16px;font-weight:700;color:var(--text);}
.settings-btn{padding:9px 18px;border-radius:0;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.settings-btn.danger{color:var(--red);border-color:var(--red-bg);background:var(--red-bg);}
.settings-btn:active{opacity:.8;}

.trip-pill{padding:7px 16px;border-radius:0;border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:13px;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;white-space:nowrap;transition:all .15s;}
.trip-pill.on{background:var(--accent);color:white;border-color:var(--accent);}
/* Trip editor */
.trip-edit-item{display:flex;align-items:center;gap:10px;padding:13px 0;border-bottom:1px solid var(--border);}
.trip-edit-name{flex:1;font-size:15px;font-weight:500;color:var(--text);}
.trip-del-btn{width:32px;height:32px;border-radius:50%;background:var(--bg);border:none;color:var(--text3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.trip-del-btn:active{background:var(--red-bg);color:var(--red);}
.add-trip-row{display:flex;gap:8px;margin-top:16px;}
.add-trip-inp{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:0;padding:12px 14px;font-family:'Outfit',sans-serif;font-size:15px;color:var(--text);outline:none;}
.add-trip-inp:focus{border-color:var(--accent);}
.add-trip-btn{background:var(--accent);border:none;border-radius:0;color:white;font-size:14px;font-weight:600;font-family:'Outfit',sans-serif;padding:0 18px;cursor:pointer;}

/* Context menu */
.ctx-ov{display:none;position:fixed;inset:0;z-index:199;}
.ctx-ov.show{display:block;}
.ctx-menu{display:none;position:fixed;z-index:200;background:var(--white);border-radius:0;border:1px solid var(--border);box-shadow:0 8px 30px rgba(0,0,0,0.15);overflow:hidden;min-width:170px;}
.ctx-menu.show{display:block;}
.ctx-item{padding:14px 18px;font-size:15px;cursor:pointer;display:flex;align-items:center;gap:10px;}
.ctx-item:active{background:var(--bg);}
.ctx-item.danger{color:var(--red);}

/* Days row */

.days-label{font-size:12px;color:var(--text2);}
.days-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);background:var(--white);color:var(--text);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.days-btn:active{background:var(--accent-bg);}
.days-num{min-width:24px;text-align:center;font-size:14px;font-weight:700;color:var(--text);}
.days-unit{font-size:12px;color:var(--text2);}
.save-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);}
.save-dot.saved{background:var(--green);}

/* Toast */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:white;padding:11px 22px;border-radius:0;font-size:14px;font-weight:500;opacity:0;transition:all .22s;pointer-events:none;white-space:nowrap;z-index:50;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Category icon colors */
.ci-blue{background:#eef1fd;color:#2d5be3;}
.ci-green{background:#e8f7f2;color:#1a9e6e;}
.ci-red{background:#fdf0f0;color:#d94040;}
.ci-yellow{background:#fdf4e3;color:#b97b0a;}
.ci-purple{background:#f3effe;color:#7c3aed;}
.ci-teal{background:#e8f7f5;color:#0d9488;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title"><span style="color:var(--accent)">T</span>abigo</div>
      <button class="icon-btn" onclick="openSettingsModal()" title="設定">⚙</button>
    </div>
  </div>

  <div class="member-bar" id="memberBar"></div>


  <div class="scroll-area" id="scrollArea"></div>

  <!-- Settings modal -->
  <div class="modal-bg" id="settingsModalBg" onclick="bgClick('settingsModalBg',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">設定</div>

      <div class="settings-item">
        <div>
          <div class="settings-label">旅行日数</div>
          <div class="settings-sub">着替えなどの枚数に反映されます</div>
        </div>
        <div class="settings-days">
          <button class="settings-days-btn" onclick="changeDays(-1)">−</button>
          <span class="settings-days-num" id="daysNum">2</span>
          <button class="settings-days-btn" onclick="changeDays(1)">+</button>
          <span style="font-size:13px;color:var(--text2)">泊</span>
        </div>
      </div>



      <div class="settings-item">
        <div>
          <div class="settings-label">前回のリストを読み込む</div>
          <div class="settings-sub">保存済みのチェック状態を復元</div>
        </div>
        <button class="settings-btn" onclick="loadSaved();closeModal('settingsModalBg')">読み込む</button>
      </div>

      <div class="settings-item">
        <div>
          <div class="settings-label">チェックをリセット</div>
          <div class="settings-sub">全員のチェックをクリア</div>
        </div>
        <button class="settings-btn danger" onclick="confirmReset();closeModal('settingsModalBg')">リセット</button>
      </div>

      <div class="modal-btns" style="margin-top:8px;">
        <button class="modal-btn pri" onclick="closeModal('settingsModalBg')">閉じる</button>
      </div>
    </div>
  </div>

    <!-- Add item popup -->
  <div class="add-popup-bg" id="addPopupBg" onclick="closeAddPopup(event)">
    <div class="add-popup">
      <div class="add-popup-title" id="addPopupTitle">アイテムを追加</div>
      <div class="add-popup-row">
        <input class="add-popup-inp" id="addPopupInp" placeholder="例：日焼け止め" onkeydown="if(event.key==='Enter')confirmAddPopup()">
        <button class="add-popup-ok" onclick="confirmAddPopup()">追加</button>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <button class="bb-btn" onclick="saveAll()">保存</button>
  </div>
</div>

<!-- Member modal -->
<div class="modal-bg" id="memModalBg" onclick="bgClick('memModalBg',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="memModalTitle">メンバーを追加</div>
    <div class="modal-label">名前</div>
    <input class="modal-inp" id="memName" placeholder="例：たろう" maxlength="8">
    <div class="modal-label">カラー</div>
    <div class="color-row" id="colorRow"></div>
    <div class="modal-check"><label><input type="checkbox" id="memKid"> 子ども用品も追加する</label></div>
    <div class="modal-btns" id="memBtns"></div>
  </div>
</div>

<!-- Trip modal -->
<div class="modal-bg" id="tripModalBg" onclick="bgClick('tripModalBg',event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">リストを編集</div>
    <div id="tripItems"></div>
    <div class="add-trip-row">
      <input class="add-trip-inp" id="newTripInp" placeholder="新しいリスト（例：出張）" maxlength="10" onkeydown="if(event.key==='Enter')addTrip()">
      <button class="add-trip-btn" onclick="addTrip()">追加</button>
    </div>
    <div class="modal-btns" style="margin-top:16px;">
      <button class="modal-btn pri" onclick="closeTripModal()">完了</button>
    </div>
  </div>
</div>

<!-- Context menu -->
<div class="ctx-ov" id="ctxOv" onclick="closeCtx()"></div>
<div class="ctx-menu" id="ctxMenu">
  <div class="ctx-item danger" onclick="ctxDel()">× 削除</div>
</div>

<div class="toast" id="toast"></div>

<script>
const PALETTE=['#2d5be3','#1a9e6e','#d94040','#d4840a','#8b3fc8','#0891b2'];

// Category icons & colors
const CAT_STYLE={
  '共通':    {icon:'★', cls:'ci-blue'},
  '衣類':    {icon:'◎', cls:'ci-purple'},
  '洗面・衛生':{icon:'◇', cls:'ci-teal'},
  'その他':  {icon:'○', cls:'ci-yellow'},
  '子ども用品':{icon:'♡', cls:'ci-red'},
  '仕事道具':{icon:'□', cls:'ci-blue'},
};
function catStyle(cat,ci){
  const s=CAT_STYLE[cat];
  if(s)return s;
  const cls=['ci-blue','ci-green','ci-red','ci-yellow','ci-purple','ci-teal'][ci%6];
  return{icon:'●',cls};
}

const TRIP_TMPL={
  '帰省':{
    '共通':[{l:'財布・現金',m:1},{l:'スマホ・充電器',m:1},{l:'交通系ICカード'},{l:'保険証'}],
    '衣類':[{l:'着替え',qty:1},{l:'下着・靴下',qty:1},{l:'パジャマ'}],
    '洗面・衛生':[{l:'歯ブラシ・歯磨き粉'},{l:'シャンプー・リンス'}],
    'その他':[{l:'手土産'},{l:'エコバッグ'}],
  },
  '旅行':{
    '共通':[{l:'財布・現金',m:1},{l:'クレジットカード',m:1},{l:'スマホ・充電器',m:1},{l:'予約確認書',m:1},{l:'保険証'}],
    '衣類':[{l:'着替え',qty:1},{l:'下着・靴下',qty:1},{l:'パジャマ'},{l:'羽織もの'}],
    '洗面・衛生':[{l:'歯ブラシ・歯磨き粉'},{l:'シャンプー・リンス'},{l:'タオル'},{l:'日焼け止め'}],
    'その他':[{l:'折り畳み傘'},{l:'モバイルバッテリー'},{l:'エコバッグ'}],
  },
  '出張':{
    '共通':[{l:'財布・現金',m:1},{l:'クレジットカード',m:1},{l:'スマホ・充電器',m:1},{l:'名刺'},{l:'社員証・ID'},{l:'予約確認書',m:1}],
    '仕事道具':[{l:'ノートPC・充電器',m:1},{l:'モバイルバッテリー'},{l:'筆記用具・ノート'}],
    '衣類':[{l:'スーツ・ビジネス服',m:1},{l:'着替え',qty:1},{l:'下着・靴下',qty:1}],
    '洗面・衛生':[{l:'歯ブラシ・歯磨き粉'},{l:'シャンプー・リンス'}],
  },
};
const KIDS_EXTRA={
  '帰省':{'子ども用品':[{l:'着替え',qty:1},{l:'おもちゃ・絵本'},{l:'お薬・お薬手帳',m:1}]},
  '旅行':{'子ども用品':[{l:'着替え',qty:1},{l:'タブレット・おもちゃ'},{l:'お薬・お薬手帳',m:1},{l:'抱っこ紐・バギー'}]},
  '出張':{'子ども用品':[{l:'着替え',qty:1},{l:'おもちゃ'},{l:'お薬・お薬手帳',m:1}]},
};

let trips=['帰省','旅行','出張'];
let trip='帰省';
let active=0;
let days=2;
let showDone=true;
let members=[
  {name:'ひろ',color:'#2d5be3',kid:false},
  {name:'パートナー',color:'#1a9e6e',kid:false},
  {name:'子ども',color:'#d4840a',kid:true},
];
let checks={},custom={},collapsed={};
let editMem=-1,newColorIdx=2;
let isSaved=false;
let ctxMi=-1,ctxCat='',ctxIi=-1;
let lpTimer=null;

const SK=()=>'tbg_chk_'+trip;
const CK=()=>'tbg_cst_'+trip;

function load(){
  try{checks=JSON.parse(localStorage.getItem(SK())||'{}');}catch(e){checks={};}
  try{custom=JSON.parse(localStorage.getItem(CK())||'{}');}catch(e){custom={};}
  try{const m=localStorage.getItem('tbg_mem');if(m)members=JSON.parse(m);}catch(e){}
  try{const d=localStorage.getItem('tbg_days');if(d)days=parseInt(d)||2;}catch(e){}
  try{const t=localStorage.getItem('tbg_trips');if(t)trips=JSON.parse(t);}catch(e){}
  if(!trips.includes(trip))trip=trips[0];
}
function persist(){
  localStorage.setItem(SK(),JSON.stringify(checks));
  localStorage.setItem(CK(),JSON.stringify(custom));
  localStorage.setItem('tbg_mem',JSON.stringify(members));
  localStorage.setItem('tbg_days',String(days));
  localStorage.setItem('tbg_trips',JSON.stringify(trips));
  isSaved=true;updateSave();
}
function markUnsaved(){isSaved=false;updateSave();}
function updateSave(){}

function getCats(mi){
  const tmpl=TRIP_TMPL[trip]||TRIP_TMPL['旅行'];
  const base=JSON.parse(JSON.stringify(tmpl));
  const kids=KIDS_EXTRA[trip]||KIDS_EXTRA['旅行'];
  if(members[mi]?.kid&&kids)Object.assign(base,JSON.parse(JSON.stringify(kids)));
  const ci=custom[mi]||{};
  Object.keys(ci).forEach(cat=>{if(!base[cat])base[cat]=[];ci[cat].forEach(it=>base[cat].push(it));});
  return base;
}
function getStats(mi){
  const cats=getCats(mi);let t=0,d=0,gi=0;
  Object.values(cats).forEach(items=>items.forEach(()=>{t++;if(checks[mi+'_'+trip+'_'+gi])d++;gi++;}));
  return{t,d};
}
function getDefLen(mi,cat){
  const tmpl=TRIP_TMPL[trip]||TRIP_TMPL['旅行'];
  const kids=KIDS_EXTRA[trip]||KIDS_EXTRA['旅行'];
  return(tmpl[cat]||[]).length+(members[mi]?.kid&&kids?.[cat]?kids[cat].length:0);
}

function setTrip(t){trip=t;load();markUnsaved();render();}
function changeDays(d){days=Math.max(1,Math.min(30,days+d));document.querySelectorAll('#daysNum').forEach(el=>el.textContent=days);markUnsaved();renderPanel();}
function setMember(i){active=i;render();}

function renderTripTabs(){
  const sl=document.getElementById('settingsTripList');
  if(sl)sl.innerHTML=trips.map(t=>
    `<button class="trip-pill${t===trip?' on':''}" onclick="setTrip('${t}')">${t}</button>`
  ).join('');
}

const prevDone={};
function renderMemberBar(){
  let h='';
  members.forEach((m,i)=>{
    const{t,d}=getStats(i);
    const pct=t?Math.round(d/t*100):0;
    const done=t>0&&d===t;
    const justDone=done&&!prevDone[i];
    if(done)prevDone[i]=true;
    else delete prevDone[i];
    h+=`<div class="mem-chip${i===active?' on':''}${done?' complete':''}" onclick="setMember(${i})" oncontextmenu="openEditMem(event,${i})" id="memchip_${i}">
      <div class="mem-chip-top">
        <div class="mem-av" style="background:${m.color}22;color:${m.color}">${m.name[0]}</div>
        <span class="mem-name">${m.name}</span>
        ${done
          ? `<span style="color:var(--green);font-size:12px;font-weight:700">✓</span>`
          : `<span class="mem-pct">${pct}%</span>`
        }
      </div>
      <div class="mem-mini-track">
        <div class="mem-mini-fill" style="width:${pct}%;background:${done?'var(--green)':m.color}"></div>
      </div>
    </div>`;
    if(justDone)setTimeout(()=>launchConfetti(i),50);
  });
  h+=`<button class="add-mem" onclick="openAddMem()">+</button>`;
  document.getElementById('memberBar').innerHTML=h;
}

function launchConfetti(mi){
  const chip=document.getElementById('memchip_'+mi);
  if(!chip)return;
  const rect=chip.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  const colors=['#2d5be3','#1a9e6e','#f5c400','#d94040','#8b3fc8','#ff6b6b','#ffd93d'];
  for(let i=0;i<22;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${cx+Math.random()*60-30}px;top:${cy}px;background:${colors[i%colors.length]};transform:rotate(${Math.random()*360}deg);animation-delay:${Math.random()*0.3}s;animation-duration:${0.7+Math.random()*0.5}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1400);
  }
}



function renderPanel(){
  const cats=getCats(active);
  let gi=0,h='';
  Object.entries(cats).forEach(([cat,items],ci)=>{
    const startGi=gi;
    const doneCnt=items.filter((_,ii)=>checks[active+'_'+trip+'_'+(startGi+ii)]).length;
    const colKey=active+'_'+trip+'_'+cat;
    const allDone=items.length>0&&doneCnt===items.length;
    const st=catStyle(cat,ci);
    h+=`<div class="cat-card">
      <div class="cat-hdr">
        <div class="cat-icon ${st.cls}">${st.icon}</div>
        <div class="cat-info">
          <div class="cat-name">${cat}</div>
        </div>
        <button class="cat-add-btn" onclick="event.stopPropagation();openAddPopup(${active},'${cat}')">+</button>
      </div>`;
    {
      const pending=[],done=[];
      items.forEach((item,ii)=>{
        const gIdx=startGi+ii;
        (checks[active+'_'+trip+'_'+gIdx]?done:pending).push({item,ii,gIdx});
      });
      h+=`<div class="items-wrap">`;
      pending.forEach(({item,ii,gIdx})=>h+=itemHTML(active,cat,ii,gIdx,false,item));
      if(done.length){
        h+=`<div class="done-sep">
          <span class="done-sep-label">完了 ${done.length}件</span>
          <button class="done-toggle" onclick="event.stopPropagation();showDone=!showDone;renderPanel()">${showDone?'隠す':'表示'}</button>
        </div>`;
        if(showDone)done.forEach(({item,ii,gIdx})=>h+=itemHTML(active,cat,ii,gIdx,true,item));
      }
      h+=`</div>`;
      gi+=items.length;
    }
    h+=`</div>`;
  });
  document.getElementById('scrollArea').innerHTML=h;
  // long press
  document.querySelectorAll('.item-row').forEach(row=>{
    row.addEventListener('touchstart',e=>{
      lpTimer=setTimeout(()=>{
        if(row.dataset.def==='false')
          openCtx(e.touches[0].clientX,e.touches[0].clientY,+row.dataset.mi,row.dataset.cat,+row.dataset.ii);
      },600);
    },{passive:true});
    ['touchend','touchmove'].forEach(ev=>row.addEventListener(ev,()=>clearTimeout(lpTimer),{passive:true}));
  });
}

function itemHTML(mi,cat,ii,gIdx,isDone,item){
  const defLen=getDefLen(mi,cat);
  const isDefault=ii<defLen;
  const qty=item.qty?(days+1)+'枚':'';
  return `<div class="item-row${isDone?' done':''}" data-mi="${mi}" data-cat="${cat}" data-ii="${ii}" data-def="${isDefault}" onclick="toggle(${mi},${gIdx})">
    <div class="chk"><span class="chk-mark">✓</span></div>
    <div class="item-body" style="display:flex;align-items:baseline;gap:6px;">
      <div class="item-text">${item.l}</div>
      ${qty?`<div class="item-qty">${qty}</div>`:''}
    </div>
    ${item.m?'<span class="must-badge">必須</span>':''}
    ${!isDefault?`<button class="del-btn" onclick="event.stopPropagation();delItem(${mi},'${cat}',${ii})">×</button>`:''}
  </div>`;
}

function render(){renderTripTabs();renderMemberBar();renderPanel();}

function toggleCat(k){collapsed[k]=(collapsed[k]===false)?true:false;render();}
function toggle(mi,gi){const k=mi+'_'+trip+'_'+gi;checks[k]=!checks[k];markUnsaved();render();}

function addItem(mi,cat){
  const inp=document.getElementById('ai_'+mi+'_'+cat);
  if(!inp||!inp.value.trim())return;
  if(!custom[mi])custom[mi]={};
  if(!custom[mi][cat])custom[mi][cat]=[];
  custom[mi][cat].push({l:inp.value.trim()});
  inp.value='';markUnsaved();render();
}
function delItem(mi,cat,ii){
  const defLen=getDefLen(mi,cat);
  const ci=ii-defLen;
  if(custom[mi]?.hasOwnProperty(cat)&&ci>=0){custom[mi][cat].splice(ci,1);markUnsaved();render();}
}

function saveAll(){persist();showToast('保存しました');}
function loadSaved(){load();isSaved=true;updateSave();render();showToast('読み込みました');}
function confirmReset(){if(confirm('チェックをリセットしますか？')){checks={};markUnsaved();render();}}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// Member modal
function openAddMem(){
  editMem=-1;newColorIdx=members.length%PALETTE.length;
  document.getElementById('memModalTitle').textContent='メンバーを追加';
  renderColorRow();
  document.getElementById('memName').value='';
  document.getElementById('memKid').checked=false;
  document.getElementById('memBtns').innerHTML=`
    <button class="modal-btn" onclick="closeModal('memModalBg')">キャンセル</button>
    <button class="modal-btn pri" onclick="confirmMem()">追加</button>`;
  document.getElementById('memModalBg').classList.add('show');
  setTimeout(()=>document.getElementById('memName').focus(),150);
}
function openEditMem(e,i){
  e.preventDefault();editMem=i;
  const m=members[i];
  newColorIdx=Math.max(0,PALETTE.indexOf(m.color));
  document.getElementById('memModalTitle').textContent='メンバーを編集';
  renderColorRow();
  document.getElementById('memName').value=m.name;
  document.getElementById('memKid').checked=!!m.kid;
  document.getElementById('memBtns').innerHTML=`
    <button class="modal-btn danger" onclick="deleteMem(${i})">削除</button>
    <button class="modal-btn pri" onclick="confirmMem()">更新</button>`;
  document.getElementById('memModalBg').classList.add('show');
}
function renderColorRow(){
  document.getElementById('colorRow').innerHTML=PALETTE.map((c,i)=>
    `<div class="cswatch${i===newColorIdx?' sel':''}" style="background:${c}" onclick="pickColor(${i})"></div>`
  ).join('');
}
function pickColor(i){newColorIdx=i;document.querySelectorAll('.cswatch').forEach((s,j)=>s.classList.toggle('sel',j===i));}
function confirmMem(){
  const name=document.getElementById('memName').value.trim();if(!name)return;
  const color=PALETTE[newColorIdx]||PALETTE[0];
  const kid=document.getElementById('memKid').checked;
  if(editMem>=0)members[editMem]={name,color,kid};
  else{members.push({name,color,kid});active=members.length-1;}
  markUnsaved();closeModal('memModalBg');render();
}
function deleteMem(i){
  if(members.length<=1){showToast('最後のメンバーは削除できません');return;}
  if(!confirm(members[i].name+'を削除しますか？'))return;
  members.splice(i,1);if(active>=members.length)active=members.length-1;
  markUnsaved();closeModal('memModalBg');render();
}

// Trip modal
function openTripModal(){
  renderTripItems();
  document.getElementById('tripModalBg').classList.add('show');
  setTimeout(()=>document.getElementById('newTripInp').focus(),150);
}
function renderTripItems(){
  document.getElementById('tripItems').innerHTML=trips.map((t,i)=>`
    <div class="trip-edit-item">
      <span class="trip-edit-name">${t}</span>
      ${trips.length>1?`<button class="trip-del-btn" onclick="delTrip(${i})">×</button>`:''}
    </div>`).join('');
}
function addTrip(){
  const inp=document.getElementById('newTripInp');
  const name=inp.value.trim();if(!name)return;
  if(trips.includes(name)){showToast('同じ名前があります');return;}
  trips.push(name);
  if(!TRIP_TMPL[name])TRIP_TMPL[name]={'共通':[{l:'財布・現金',m:1},{l:'スマホ・充電器',m:1}],'その他':[{l:'エコバッグ'}]};
  inp.value='';markUnsaved();renderTripItems();
}
function delTrip(i){
  if(trips.length<=1){showToast('最低1つは必要です');return;}
  if(!confirm(`「${trips[i]}」を削除しますか？`))return;
  if(trip===trips[i])trip=trips[i===0?1:0];
  trips.splice(i,1);markUnsaved();renderTripItems();
}
function closeTripModal(){closeModal('tripModalBg');render();}

function closeModal(id){document.getElementById(id).classList.remove('show');}
function bgClick(id,e){if(e.target===document.getElementById(id))closeModal(id);}

// Context menu
function openCtx(x,y,mi,cat,ii){
  ctxMi=mi;ctxCat=cat;ctxIi=ii;
  const m=document.getElementById('ctxMenu');
  m.style.left=Math.min(x,window.innerWidth-180)+'px';
  m.style.top=Math.min(y,window.innerHeight-80)+'px';
  m.classList.add('show');document.getElementById('ctxOv').classList.add('show');
}
function closeCtx(){document.getElementById('ctxMenu').classList.remove('show');document.getElementById('ctxOv').classList.remove('show');}
function ctxDel(){closeCtx();if(ctxMi>=0)delItem(ctxMi,ctxCat,ctxIi);}

let addPopupMi=-1, addPopupCat='';
function openSettingsModal(){document.getElementById('settingsModalBg').classList.add('show');}

function openAddPopup(mi, cat){
  addPopupMi=mi; addPopupCat=cat;
  document.getElementById('addPopupTitle').textContent=cat+'にアイテムを追加';
  document.getElementById('addPopupInp').value='';
  document.getElementById('addPopupBg').classList.add('show');
  setTimeout(()=>document.getElementById('addPopupInp').focus(),150);
}
function closeAddPopup(e){
  if(!e||e.target===document.getElementById('addPopupBg'))
    document.getElementById('addPopupBg').classList.remove('show');
}
function confirmAddPopup(){
  const val=document.getElementById('addPopupInp').value.trim();
  if(!val)return;
  if(!custom[addPopupMi])custom[addPopupMi]={};
  if(!custom[addPopupMi][addPopupCat])custom[addPopupMi][addPopupCat]=[];
  custom[addPopupMi][addPopupCat].push({l:val});
  document.getElementById('addPopupBg').classList.remove('show');
  markUnsaved();render();
}

load();render();
</script>
